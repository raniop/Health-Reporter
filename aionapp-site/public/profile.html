<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION Health - View Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; }
        .logo { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #999; margin-bottom: 24px; line-height: 1.5; }
        .btn {
            display: inline-block;
            background: #6C5CE7;
            color: #fff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .sub { color: #666; font-size: 13px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏎️</div>
        <h1>AION Health</h1>
        <p>Download AION Health to view this profile and track your own health score.</p>
        <a href="https://apps.apple.com/us/app/aion-app/id6758244788" class="btn">
            Download on the App Store
        </a>
        <p class="sub">If you already have the app, this link should have opened it automatically.</p>
    </div>
</body>
</html>
